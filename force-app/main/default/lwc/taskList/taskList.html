<template>
    <lightning-card title="Tasks">
        <template if:true={tasks}>  
    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
        <thead>
            <tr>
            <th scope="col">Subject</th>
            <th scope="col">Due Date</th>
            <th scope="col">Done</th>
            <th scope="col" class="header-button">Action</th>
          </tr>
        </thead>
         <tbody>

                <template for:each= {tasks} for:item="task" >
                    <tr key={task.Id}>
                        <td>{task.Subject__c}</td>
                        <td>{task.DueDate__c}</td>
                        <td>{task.Done__c}</td>
                          <td class="cell-button">
                            <lightning-button
                            variant="brand"
                            label="Выполнено"
                            title="Отметить задачу как выполненную"
                            onclick={handleMarkDone}
                            data-id={task.Id}
                            disabled={task.Done__c}>
                            </lightning-button>
                        </td>

                    </tr>

                </template>
         </tbody>
    </table>
     </template> 
     <template if:true={error}>
        <div class="slds-text-color_error">{error}</div>
    </template>
    </lightning-card>
</template>
